name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip autoconf libtool \
            libffi-dev libssl-dev libbz2-dev zlib1g-dev \
            build-essential ccache git python3-pip
          pip3 install buildozer==1.5.0 cython==0.29.36

      - name: Setup Android SDK (legacy, buildozer-compatible)
        run: |
          SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK

          # Старый пакет SDK tools — кладёт sdkmanager именно в tools/bin/
          wget -q https://dl.google.com/android/repository/sdk-tools-linux-4333796.zip
          unzip -q sdk-tools-linux-4333796.zip -d $SDK

          # Лицензии
          mkdir -p $SDK/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n8933bad161af4178b1185d1a37fbf41ea5269c55" \
            > $SDK/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd" \
            > $SDK/licenses/android-sdk-preview-license

          export ANDROID_HOME=$SDK
          yes | $SDK/tools/bin/sdkmanager --licenses 2>/dev/null || true
          $SDK/tools/bin/sdkmanager \
            "build-tools;29.0.2" \
            "platforms;android-29" \
            "platform-tools"

      - name: Fix buildozer.spec for CI
        run: |
          sed -i 's/android.api = .*/android.api = 29/' buildozer.spec
          sed -i 's/android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/android.ndk = .*/android.ndk = 25b/' buildozer.spec
          sed -i '/android.sdk = /d' buildozer.spec
          echo "--- buildozer.spec android settings ---"
          grep "android\." buildozer.spec | grep -v "^#"

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
        run: echo y | buildozer android debug 2>&1 | tail -100

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeuroPix-APK
          path: bin/*.apk
