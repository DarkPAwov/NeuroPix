name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip openjdk-17-jdk zip unzip autoconf libtool libffi-dev libssl-dev libbz2-dev zlib1g-dev build-essential ccache git
          pip3 install buildozer==1.5.0 cython==0.29.36
      - name: Accept licenses & Build
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo y | buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NeuroPix-APK
          path: bin/*.apk
